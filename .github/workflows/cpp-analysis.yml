# .github/workflows/cpp-analysis.yml
name: C++ static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  infer:
    name: Infer SARIF incremental
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential curl xz-utils clang

      - name: Install Infer
        run: |
          curl -L https://github.com/facebook/infer/releases/download/v1.3.0/infer-linux-x86_64-v1.3.0.tar.xz -o infer.tar.xz
          tar -xf infer.tar.xz
          echo "$PWD/infer-linux-x86_64-v1.3.0/bin" >> "$GITHUB_PATH"

      - name: Restore Infer cache
        id: infer-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            infer-out
          key: infer-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            infer-${{ runner.os }}-${{ github.ref_name }}-
            infer-${{ runner.os }}-main-

      - name: Configure CMake
        run: |
          rm -rf build-infer

          cmake -S . -B build-infer \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Determine changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }}...HEAD > infer-changed-files-all.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > infer-changed-files-all.txt || true
          fi

          grep -E '\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$' infer-changed-files-all.txt > infer-changed-files.txt || true

          echo "Changed C/C++ files:"
          cat infer-changed-files.txt || true

      - name: Run Infer
        run: |
          infer --version

          if [ ! -d infer-out ] || [ ! -f infer-out/capture.db ]; then
            echo "No previous infer-out cache found. Running full Infer analysis."

            infer run \
              --sarif \
              --results-dir infer-out \
              --compilation-database build-infer/compile_commands.json || true

          elif [ ! -s infer-changed-files.txt ]; then
            echo "No changed C/C++ files. Reusing previous Infer state."

            if [ ! -f infer-out/report.sarif ]; then
              echo '{"version":"2.1.0","runs":[]}' > infer-out/report.sarif
            fi

          else
            echo "Previous infer-out cache found. Running Infer reactive analysis."

            infer run \
              --reactive \
              --sarif \
              --results-dir infer-out \
              --changed-files-index infer-changed-files.txt \
              --compilation-database build-infer/compile_commands.json || true
          fi

          echo "Infer output:"
          ls -la infer-out || true

          echo "Infer report:"
          cat infer-out/report.txt || true

          if [ ! -f infer-out/report.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > infer-out/report.sarif
          fi

      - name: Upload Infer SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: infer-out/report.sarif
          category: infer

      - name: Save Infer cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            infer-out
          key: infer-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Infer artifact for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infer-out
          path: infer-out
          retention-days: 7

  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format python3

      - name: Collect C/C++ files
        run: |
          git ls-files \
            '*.c' '*.cc' '*.cpp' '*.cxx' \
            '*.h' '*.hh' '*.hpp' '*.hxx' \
            > format-files.txt

          cat format-files.txt

      - name: Run clang-format dry-run
        run: |
          if [ -s format-files.txt ]; then
            xargs -a format-files.txt -r clang-format --dry-run --Werror \
              2> clang-format.txt || true
          else
            touch clang-format.txt
          fi

          cat clang-format.txt

      - name: Convert clang-format output to SARIF
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          text = Path("clang-format.txt").read_text(errors="replace")
          pattern = re.compile(r"^(.*?):(\d+):(\d+):\s+error:\s+(.*)$")

          results = []
          for line in text.splitlines():
              m = pattern.match(line)
              if not m:
                  continue

              file, row, col, msg = m.groups()

              results.append({
                  "ruleId": "clang-format",
                  "level": "error",
                  "message": {"text": msg},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": file},
                          "region": {
                              "startLine": int(row),
                              "startColumn": int(col)
                          }
                      }
                  }]
              })

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "clang-format",
                          "informationUri": "https://clang.llvm.org/docs/ClangFormat.html",
                          "rules": [{
                              "id": "clang-format",
                              "name": "clang-format",
                              "shortDescription": {
                                  "text": "File is not formatted according to .clang-format"
                              }
                          }]
                      }
                  },
                  "results": results
              }]
          }

          Path("clang-format.sarif").write_text(json.dumps(sarif, indent=2))
          PY

      - name: Upload clang-format SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: clang-format.sarif
          category: clang-format

      - name: Fail if formatting is wrong
        run: |
          if [ -s clang-format.txt ]; then
            echo "clang-format found formatting problems."
            exit 1
          fi